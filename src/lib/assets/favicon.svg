<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a21caf"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="45%" stop-color="#f5e07a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.85"/>

  <!-- Large bold heart - fills most of circle -->
  <path d="M50,76
    C47,73 37,64 29,55
    C21,46 17,38 17,31
    C17,21 24,14 33,14
    C38,14 44,18 50,25
    C56,18 62,14 67,14
    C76,14 83,21 83,31
    C83,38 79,46 71,55
    C63,64 53,73 50,76Z"
    fill="url(#goldV)" filter="url(#glow)"/>

  <!-- Heart shine highlight -->
  <path d="M38,22 C35,25 33,29 33,33 C33,36 34,38 36,40"
    fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3" stroke-linecap="round"/>

  <!-- S & M text inside heart -->
  <text x="36" y="53"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20" font-weight="700" font-style="italic"
    fill="#6b21a8" text-anchor="middle"
    opacity="0.9">S</text>

  <text x="64" y="53"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20" font-weight="700" font-style="italic"
    fill="#6b21a8" text-anchor="middle"
    opacity="0.9">M</text>

  <!-- × between S and M -->
  <text x="50" y="50"
    font-family="Georgia, serif"
    font-size="10" font-weight="400"
    fill="#6b21a8" text-anchor="middle"
    opacity="0.7">×</text>

  <!-- Bottom year text -->
  <text x="50" y="90"
    font-family="Georgia, serif"
    font-size="7.5" font-weight="400"
    fill="rgba(255,255,255,0.6)" text-anchor="middle"
    letter-spacing="1.5">2026</text>

  <!-- Bottom ornament dots -->
  <circle cx="50" cy="94" r="1.3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="44" cy="94" r="0.8" fill="url(#gold)" opacity="0.35"/>
  <circle cx="56" cy="94" r="0.8" fill="url(#gold)" opacity="0.35"/>
</svg>
